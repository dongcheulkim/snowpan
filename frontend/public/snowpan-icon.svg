<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100">
  <!-- PAN wordmark — 브랜드 AI 파일과 동일한 chevron-A 처리 -->
  <g fill="#0f172a" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="86" letter-spacing="6">
    <text x="20" y="76">P</text>
    <text x="170" y="76">N</text>
  </g>
  <!-- A 자리 chevron — letter stroke 두께와 시각 일치 -->
  <polyline points="100,80 120,16 140,80" fill="none" stroke="#0f172a" stroke-width="12" stroke-linecap="butt" stroke-linejoin="miter" />
</svg>
