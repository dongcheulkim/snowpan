<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <g fill="none" stroke="#0f172a" stroke-width="2.6" stroke-linecap="round">
    <!-- 6 arms via 60deg rotations -->
    <g>
      <line x1="32" y1="8" x2="32" y2="56"/>
      <line x1="32" y1="14" x2="27" y2="19"/>
      <line x1="32" y1="14" x2="37" y2="19"/>
      <line x1="32" y1="50" x2="27" y2="45"/>
      <line x1="32" y1="50" x2="37" y2="45"/>
    </g>
    <g transform="rotate(60 32 32)">
      <line x1="32" y1="8" x2="32" y2="56"/>
      <line x1="32" y1="14" x2="27" y2="19"/>
      <line x1="32" y1="14" x2="37" y2="19"/>
      <line x1="32" y1="50" x2="27" y2="45"/>
      <line x1="32" y1="50" x2="37" y2="45"/>
    </g>
    <g transform="rotate(120 32 32)">
      <line x1="32" y1="8" x2="32" y2="56"/>
      <line x1="32" y1="14" x2="27" y2="19"/>
      <line x1="32" y1="14" x2="37" y2="19"/>
      <line x1="32" y1="50" x2="27" y2="45"/>
      <line x1="32" y1="50" x2="37" y2="45"/>
    </g>
  </g>
</svg>
