<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- SNOW PAN wordmark — centered around x=600, y=310 -->
  <g fill="#0f172a">
    <text x="510" y="325" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="140" letter-spacing="20">SNOW P</text>
    <text x="720" y="325" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="100" font-size="140" letter-spacing="20">N</text>
  </g>
  <polyline points="536,325 615,205 694,325" stroke="#0f172a" stroke-width="4.5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Divider -->
  <line x1="540" y1="425" x2="660" y2="425" stroke="#0f172a" stroke-width="2" stroke-linecap="square"/>

  <!-- Key message -->
  <text x="600" y="485" font-size="38" text-anchor="middle" fill="#0f172a" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">설원 위의 자유, 끝없는 플레이의 장</text>
  <text x="600" y="535" font-size="22" text-anchor="middle" fill="#64748b" font-weight="400" letter-spacing="4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">FREEDOM ON THE SNOW · ENDLESS PLAYGROUND</text>
</svg>
