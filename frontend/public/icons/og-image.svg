<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- SNOW PAN wordmark — large, centered around x=600, y=300 -->
  <g fill="#0f172a">
    <text x="530" y="320" text-anchor="end" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="200" font-size="120" letter-spacing="16">SNOW P</text>
    <text x="700" y="320" text-anchor="start" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="200" font-size="120" letter-spacing="16">N</text>
  </g>
  <polyline points="556,320 615,216 674,320" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Divider -->
  <line x1="540" y1="418" x2="660" y2="418" stroke="#0f172a" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Key message -->
  <text x="600" y="480" font-size="38" text-anchor="middle" fill="#0f172a" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">설원 위의 자유, 끝없는 플레이의 장</text>
  <text x="600" y="530" font-size="22" text-anchor="middle" fill="#64748b" font-weight="400" letter-spacing="4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">FREEDOM ON THE SNOW · ENDLESS PLAYGROUND</text>
</svg>
