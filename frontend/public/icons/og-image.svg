<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Main wordmark -->
  <text x="600" y="300" font-size="180" text-anchor="middle" fill="#ffffff" font-weight="900" letter-spacing="-8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', 'Pretendard', sans-serif">스노우판</text>

  <!-- English subtitle -->
  <text x="600" y="375" font-size="42" text-anchor="middle" fill="#bae6fd" font-weight="700" letter-spacing="16" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif">SNOWPAN</text>

  <!-- Divider -->
  <line x1="540" y1="420" x2="660" y2="420" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="600" y="475" font-size="36" text-anchor="middle" fill="#ffffff" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">스키 · 보드 중고거래 &amp; 렌탈</text>
  <text x="600" y="525" font-size="28" text-anchor="middle" fill="#e0f2fe" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">장비부터 레슨 · 숙소까지 한눈에 비교</text>
</svg>
