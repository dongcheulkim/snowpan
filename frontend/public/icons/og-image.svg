<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative snowflakes (subtle) -->
  <g opacity="0.12" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none">
    <g transform="translate(140 140)">
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="-26" y1="-15" x2="26" y2="15"/>
      <line x1="-26" y1="15" x2="26" y2="-15"/>
    </g>
    <g transform="translate(1060 110)">
      <line x1="0" y1="-22" x2="0" y2="22"/>
      <line x1="-19" y1="-11" x2="19" y2="11"/>
      <line x1="-19" y1="11" x2="19" y2="-11"/>
    </g>
    <g transform="translate(1100 520)">
      <line x1="0" y1="-34" x2="0" y2="34"/>
      <line x1="-29" y1="-17" x2="29" y2="17"/>
      <line x1="-29" y1="17" x2="29" y2="-17"/>
    </g>
    <g transform="translate(200 500)">
      <line x1="0" y1="-26" x2="0" y2="26"/>
      <line x1="-22" y1="-13" x2="22" y2="13"/>
      <line x1="-22" y1="13" x2="22" y2="-13"/>
    </g>
  </g>

  <!-- Logo mark -->
  <g transform="translate(420 260)">
    <rect x="-90" y="-90" width="180" height="180" rx="38" fill="#ffffff"/>
    <g stroke="#0284c7" stroke-width="9" stroke-linecap="round" fill="none">
      <line x1="0" y1="-60" x2="0" y2="60"/>
      <line x1="-52" y1="-30" x2="52" y2="30"/>
      <line x1="-52" y1="30" x2="52" y2="-30"/>
    </g>
    <g fill="#0284c7">
      <circle cx="0" cy="-60" r="7"/>
      <circle cx="0" cy="60" r="7"/>
      <circle cx="-52" cy="-30" r="7"/>
      <circle cx="-52" cy="30" r="7"/>
      <circle cx="52" cy="-30" r="7"/>
      <circle cx="52" cy="30" r="7"/>
      <circle cx="0" cy="0" r="13"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="560" y="230" font-size="92" fill="#ffffff" font-weight="900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" letter-spacing="-2">스노우판</text>
  <text x="560" y="290" font-size="30" fill="#bae6fd" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" letter-spacing="3">SNOWPAN</text>

  <!-- Tagline -->
  <text x="560" y="380" font-size="38" fill="#ffffff" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">스키 · 보드 중고거래 &amp; 렌탈</text>
  <text x="560" y="430" font-size="28" fill="#e0f2fe" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">장비부터 레슨·숙소까지 한눈에 비교</text>

  <!-- Bottom accent bar -->
  <rect x="560" y="475" width="80" height="6" rx="3" fill="#38bdf8"/>
</svg>
