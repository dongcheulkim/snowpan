        },
        {
          "@type": "WebSite",
          "@id": "https://snowpan.vercel.app/#website",
          "url": "https://snowpan.vercel.app",
          "name": "스노우판",
          "publisher": { "@id": "https://snowpan.vercel.app/#organization" },
          "inLanguage": "ko-KR",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://snowpan.vercel.app/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }

    <style>
      /* 프로덕션 방문자에겐 Vercel Toolbar/Live Feedback 숨김 */
      #vercel-live-feedback,
      div[data-vercel-live-feedback],
      div[id^="__vercel-toolbar"],
      iframe[src*="vercel.live"],
      iframe[src*="vercel-toolbar"] {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <title>스노우판 — 스키·보드 중고거래·렌탈·레슨·숙소</title>
  </head>
  <body>
    <!-- 웹 첫 로딩 스플래시 — JS 번들 로드 전에도 즉시 표시. React 마운트 후 자동 제거. -->
    <div id="app-splash" aria-hidden="true">
      <img src="/snowpan-wordmark.svg" alt="" id="app-splash-logo" />
      <div id="app-splash-bar"><span></span></div>
    </div>
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
        background: #f0f9ff;
        opacity: 1; transition: opacity .45s ease;
      }
      #app-splash.hide { opacity: 0; pointer-events: none; }
      #app-splash-logo {
        width: min(56vw, 240px); height: auto;
        animation: splashLogo .7s cubic-bezier(.2,.7,.2,1) both;
      }
      #app-splash-bar {
        width: 120px; height: 3px; border-radius: 3px; background: rgba(15,23,42,.1); overflow: hidden;
      }
      #app-splash-bar span {
        display: block; height: 100%; width: 40%; border-radius: 3px; background: #0f172a;
        animation: splashBar 1.1s ease-in-out infinite;
      }
      @keyframes splashLogo {
        from { opacity: 0; transform: translateY(8px) scale(.98); }
        to   { opacity: 1; transform: none; }
      }
      @keyframes splashBar {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
      @media (prefers-color-scheme: dark) {
        /* 앱은 라이트 전용이지만 스플래시 순간 깜빡임 방지 위해 배경만 맞춤 */
        #app-splash { background: #f0f9ff; }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
