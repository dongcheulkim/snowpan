    <style>
      /* 프로덕션 방문자에겐 Vercel Toolbar/Live Feedback 숨김 */
      #vercel-live-feedback,
      div[data-vercel-live-feedback],
      div[id^="__vercel-toolbar"],
      iframe[src*="vercel.live"],
      iframe[src*="vercel-toolbar"] {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <title>스노우판 — 스키·보드 중고거래·렌탈·레슨·숙소</title>
  </head>
  <body>
    <!-- 웹 첫 로딩 스플래시 — 눈 내리는 연출. JS 번들 로드 전에도 즉시 표시, React 마운트 후 자동 제거. -->
    <div id="app-splash" aria-hidden="true">
      <div id="app-splash-snow">
        <span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span>
        <span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span>
        <span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span>
        <span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span>
        <span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span>
        <span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span>
      </div>
      <img src="/snowpan-wordmark.svg" alt="" id="app-splash-logo" />
    </div>
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(160deg, #dbeafe 0%, #eff6ff 45%, #ffffff 100%);
        opacity: 1; transition: opacity .5s ease;
        overflow: hidden;
      }
      #app-splash.hide { opacity: 0; pointer-events: none; }
      #app-splash-logo {
        position: relative; z-index: 2;
        width: min(58vw, 250px); height: auto;
        animation: splashLogo 1s cubic-bezier(.16,.84,.28,1) both;
      }
      /* 눈송이 컨테이너 */
      #app-splash-snow { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
      #app-splash-snow .flake {
        position: absolute; top: -8%;
        color: #bfdbfe; /* 연한 하늘색 눈 */
        user-select: none;
        animation-name: splashFall;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        will-change: transform;
      }
      /* 18개 눈송이 — 위치·크기·속도·지연 제각각으로 자연스럽게 */
      .flake:nth-child(1){left:5%;font-size:14px;animation-duration:5.5s;animation-delay:0s;opacity:.7}
      .flake:nth-child(2){left:14%;font-size:22px;animation-duration:7s;animation-delay:1.2s;opacity:.9}
      .flake:nth-child(3){left:22%;font-size:12px;animation-duration:4.8s;animation-delay:.4s;opacity:.6}
      .flake:nth-child(4){left:31%;font-size:26px;animation-duration:8s;animation-delay:2s;opacity:.85}
      .flake:nth-child(5){left:39%;font-size:16px;animation-duration:6s;animation-delay:.8s;opacity:.75}
      .flake:nth-child(6){left:47%;font-size:20px;animation-duration:7.5s;animation-delay:1.6s;opacity:.9}
      .flake:nth-child(7){left:55%;font-size:13px;animation-duration:5s;animation-delay:.2s;opacity:.65}
      .flake:nth-child(8){left:62%;font-size:24px;animation-duration:8.5s;animation-delay:2.4s;opacity:.85}
      .flake:nth-child(9){left:70%;font-size:15px;animation-duration:6.5s;animation-delay:1s;opacity:.7}
      .flake:nth-child(10){left:78%;font-size:19px;animation-duration:7.2s;animation-delay:.6s;opacity:.8}
      .flake:nth-child(11){left:85%;font-size:12px;animation-duration:5.2s;animation-delay:1.8s;opacity:.6}
      .flake:nth-child(12){left:92%;font-size:23px;animation-duration:7.8s;animation-delay:.3s;opacity:.88}
      .flake:nth-child(13){left:9%;font-size:18px;animation-duration:6.8s;animation-delay:2.8s;opacity:.78}
      .flake:nth-child(14){left:27%;font-size:14px;animation-duration:5.6s;animation-delay:1.4s;opacity:.68}
      .flake:nth-child(15){left:44%;font-size:21px;animation-duration:7.6s;animation-delay:3.2s;opacity:.82}
      .flake:nth-child(16){left:60%;font-size:16px;animation-duration:6.2s;animation-delay:2.2s;opacity:.72}
      .flake:nth-child(17){left:75%;font-size:25px;animation-duration:8.2s;animation-delay:.9s;opacity:.86}
      .flake:nth-child(18){left:88%;font-size:13px;animation-duration:5.4s;animation-delay:2.6s;opacity:.64}
      @keyframes splashLogo {
        0%   { opacity: 0; transform: translateY(14px) scale(.94); }
        60%  { opacity: 1; }
        100% { opacity: 1; transform: none; }
      }
      @keyframes splashFall {
        0%   { transform: translateY(0) translateX(0) rotate(0deg); }
        100% { transform: translateY(115vh) translateX(28px) rotate(220deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash-snow { display: none; } /* 모션 최소화 설정 시 눈 숨김 */
        #app-splash-logo { animation: none; }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
