        <span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span><span class="flake">❄</span><span class="flake">❅</span>
        <span class="flake">❆</span><span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span><span class="flake">❄</span>

        <span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span><span class="flake">❄</span><span class="flake">❅</span>
        <span class="flake">❆</span><span class="flake">❄</span><span class="flake">❅</span><span class="flake">❆</span><span class="flake">❄</span>
      </div>
      <img src="/snowpan-wordmark.svg" alt="" id="app-splash-logo" />
    </div>
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(160deg, #dbeafe 0%, #eff6ff 45%, #ffffff 100%);
        opacity: 1; transition: opacity .5s ease;
        overflow: hidden;
      }
      #app-splash.hide { opacity: 0; pointer-events: none; }
      #app-splash-logo {
        position: relative; z-index: 2;
        width: min(58vw, 250px); height: auto;
        animation: splashLogo 1s cubic-bezier(.16,.84,.28,1) both;
      }
      /* 눈송이 컨테이너 */
      #app-splash-snow { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
      #app-splash-snow .flake {
        position: absolute; top: -8%;
        color: #bfdbfe; /* 연한 하늘색 눈 */
        user-select: none;
        animation-name: splashFall;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        will-change: transform;
      }
      /* 40개 눈송이 — 위치·크기·속도·지연 제각각으로 펑펑 내리는 느낌.
         낙하 속도는 3~5.5s 로 빠르게 (더 활발하게). 초기 지연을 짧게 흩어 화면이 빨리 채워짐. */
      .flake:nth-child(1){left:2%;font-size:14px;animation-duration:4s;animation-delay:0s;opacity:.7}
      .flake:nth-child(2){left:7%;font-size:22px;animation-duration:4.8s;animation-delay:.3s;opacity:.9}
      .flake:nth-child(3){left:11%;font-size:12px;animation-duration:3.4s;animation-delay:.1s;opacity:.6}
      .flake:nth-child(4){left:15%;font-size:26px;animation-duration:5.2s;animation-delay:.6s;opacity:.85}
      .flake:nth-child(5){left:19%;font-size:16px;animation-duration:4.2s;animation-delay:.2s;opacity:.75}
      .flake:nth-child(6){left:23%;font-size:20px;animation-duration:4.6s;animation-delay:.5s;opacity:.9}
      .flake:nth-child(7){left:27%;font-size:13px;animation-duration:3.6s;animation-delay:0s;opacity:.65}
      .flake:nth-child(8){left:31%;font-size:24px;animation-duration:5.4s;animation-delay:.8s;opacity:.85}
      .flake:nth-child(9){left:35%;font-size:15px;animation-duration:4.4s;animation-delay:.35s;opacity:.7}
      .flake:nth-child(10){left:39%;font-size:19px;animation-duration:4.9s;animation-delay:.15s;opacity:.8}
      .flake:nth-child(11){left:43%;font-size:12px;animation-duration:3.5s;animation-delay:.7s;opacity:.6}
      .flake:nth-child(12){left:47%;font-size:23px;animation-duration:5.1s;animation-delay:.1s;opacity:.88}
      .flake:nth-child(13){left:51%;font-size:18px;animation-duration:4.5s;animation-delay:.9s;opacity:.78}
      .flake:nth-child(14){left:55%;font-size:14px;animation-duration:3.8s;animation-delay:.4s;opacity:.68}
      .flake:nth-child(15){left:59%;font-size:21px;animation-duration:5.3s;animation-delay:1s;opacity:.82}
      .flake:nth-child(16){left:63%;font-size:16px;animation-duration:4.1s;animation-delay:.25s;opacity:.72}
      .flake:nth-child(17){left:67%;font-size:25px;animation-duration:5.5s;animation-delay:.55s;opacity:.86}
      .flake:nth-child(18){left:71%;font-size:13px;animation-duration:3.7s;animation-delay:.05s;opacity:.64}
      .flake:nth-child(19){left:75%;font-size:20px;animation-duration:4.7s;animation-delay:.75s;opacity:.8}
      .flake:nth-child(20){left:79%;font-size:15px;animation-duration:4s;animation-delay:.3s;opacity:.7}
      .flake:nth-child(21){left:83%;font-size:24px;animation-duration:5.2s;animation-delay:.6s;opacity:.85}
      .flake:nth-child(22){left:87%;font-size:12px;animation-duration:3.4s;animation-delay:.2s;opacity:.6}
      .flake:nth-child(23){left:91%;font-size:22px;animation-duration:4.9s;animation-delay:.45s;opacity:.9}
      .flake:nth-child(24){left:95%;font-size:16px;animation-duration:4.3s;animation-delay:.1s;opacity:.75}
      .flake:nth-child(25){left:4%;font-size:19px;animation-duration:4.6s;animation-delay:1.1s;opacity:.78}

      .flake:nth-child(29){left:37%;font-size:26px;animation-duration:5.5s;animation-delay:1.5s;opacity:.82}

      .flake:nth-child(31){left:53%;font-size:20px;animation-duration:4.8s;animation-delay:1.2s;opacity:.8}
      .flake:nth-child(32){left:61%;font-size:12px;animation-duration:3.5s;animation-delay:.4s;opacity:.6}
      .flake:nth-child(33){left:69%;font-size:24px;animation-duration:5.3s;animation-delay:1.4s;opacity:.86}
      .flake:nth-child(34){left:77%;font-size:16px;animation-duration:4.1s;animation-delay:.9s;opacity:.72}

      .flake:nth-child(36){left:93%;font-size:13px;animation-duration:3.7s;animation-delay:.7s;opacity:.64}

      .flake:nth-child(38){left:33%;font-size:22px;animation-duration:5.1s;animation-delay:1.05s;opacity:.88}
      .flake:nth-child(39){left:57%;font-size:15px;animation-duration:4.3s;animation-delay:1.55s;opacity:.7}
      .flake:nth-child(40){left:81%;font-size:25px;animation-duration:5.4s;animation-delay:1.15s;opacity:.85}
      @keyframes splashLogo {
        0%   { opacity: 0; transform: translateY(14px) scale(.94); }
        60%  { opacity: 1; }
        100% { opacity: 1; transform: none; }
      }
      @keyframes splashFall {
        0%   { transform: translateY(0) translateX(0) rotate(0deg); }
        100% { transform: translateY(115vh) translateX(28px) rotate(220deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash-snow { display: none; } /* 모션 최소화 설정 시 눈 숨김 */
        #app-splash-logo { animation: none; }
      }
