services:
  - type: web
    name: snowpan-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    # seed-test-images.ts 는 1회성이라 체인에서 제거 — 필요 시 수동으로 npx tsx prisma/seed-test-images.ts 실행.
    startCommand: npx tsx prisma/merge-chatrooms.ts && npx prisma db push --skip-generate && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PORT
        value: 3000
      # 부하테스트 rate-limit bypass 키 (load-tests/ 가 이 값을 헤더로 전송).
      # 일반 사용자는 이 키를 모르므로 영향 없음. 교체하려면 render.yaml + load-tests/flows.js 동시 변경.
      - key: LOADTEST_BYPASS_KEY
        value: 570aa05b333d6fbf7dfa5de40842f8477139f4a2b4e4f0af
